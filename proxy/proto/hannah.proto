syntax = "proto3";

package hannah;

option java_package = "io.hannah";
option java_outer_classname = "HannahProto";

option go_package = "dev.kernstock.net/gessinger/voice/hannah/proxy/proto/hannah";

// ============================================================
//  Hannah gRPC Service
//
//  Allows external services (Telegram bot, web UI, etc.) to:
//    - query and manage the user registry
//    - submit text commands and receive answers
//    - trigger TTS announcements on satellites
//    - inspect registered satellites
//    - query live car state
//    - subscribe to a stream of Hannah events (car parked, resident arrived, …)
//    - register as a satellite audio proxy (Go gRPC proxy replaces UDP server)
// ============================================================

service HannahService {

  // --- User Registry ---
  rpc GetUsers      (GetUsersRequest)      returns (GetUsersResponse);
  rpc GetUser       (GetUserRequest)       returns (UserResponse);
  rpc LinkAccount   (LinkAccountRequest)   returns (StatusResponse);
  rpc UnlinkAccount (UnlinkAccountRequest) returns (StatusResponse);
  rpc SetTrustLevel       (SetTrustLevelRequest)       returns (StatusResponse);
  rpc SetSystemMessages   (SetSystemMessagesRequest)   returns (StatusResponse);

  // --- Device Control Menu ---
  // Returns all rooms and devices with current state — for building control menus.
  rpc GetDevices    (Empty)                returns (GetDevicesResponse);
  // Directly set a device state (bypasses NLU). Trust level check is done by the caller.
  rpc ControlDevice (ControlDeviceRequest) returns (StatusResponse);

  // --- Control ---
  // Submit a plain-text command; Hannah processes it through NLU and returns the answer.
  rpc SubmitText    (SubmitTextRequest)    returns (SubmitTextResponse);
  // Submit a voice message (OGG/Opus bytes); Hannah does STT → NLU → TTS and returns the result.
  rpc SubmitVoice   (SubmitVoiceRequest)   returns (SubmitVoiceResponse);
  // Send a TTS announcement to one satellite or all ("all").
  rpc Announce      (AnnounceRequest)      returns (StatusResponse);
  // Send a notification from ioBroker to Hannah. Returns ok=true when queued.
  // direct=true: skip LLM reformulation. severity: "alert"|"notify"|"info".
  rpc Notify        (AgentNotification)    returns (StatusResponse);
  // List all currently registered UDP satellites.
  rpc GetSatellites (Empty)               returns (GetSatellitesResponse);

  // --- Car ---
  // Returns the current cached car state (available=false if no data received yet).
  rpc GetCarState      (Empty)            returns (CarStateResponse);
  // Returns all tracked car states (one per configured car).
  rpc GetAllCarStates  (Empty)            returns (GetAllCarStatesResponse);

  // --- Event stream ---
  // Opens a server-side stream; Hannah pushes events as they occur.
  // Pass event_types to filter (empty = all events).
  // Known event types: "car.parked", "resident.arrived", "resident.departed", "satellite.firmware"
  rpc SubscribeEvents (EventFilter)       returns (stream HannahEvent);

  // --- Firmware Manager ---
  // Trigger an immediate OTA update for a satellite (bypasses residents check).
  rpc TriggerFirmwareUpdate (TriggerFirmwareUpdateRequest) returns (StatusResponse);

  // --- Satellite Proxy (Go gRPC proxy) ---
  // Bidirectional keepalive stream. Proxy sends heartbeats; Hannah sends TTS
  // audio commands back (for announcements). While this stream is open, Hannah
  // disables its own UDP server. If the stream drops, Hannah re-enables UDP.
  rpc RegisterProxy       (stream ProxyHeartbeat)              returns (stream ProxyCommand);
  // Submit a complete satellite audio session for processing.
  // Hannah runs the full pipeline (STT → NLU → TTS → MQTT status) and returns
  // the result so the proxy can play TTS audio back to the satellite.
  rpc SubmitSatelliteAudio(SubmitSatelliteAudioRequest)        returns (SubmitSatelliteAudioResponse);
  // Notify Hannah that a satellite registered or disconnected via the proxy.
  // Hannah updates its room registry (hannah/rooms MQTT) immediately.
  rpc NotifySatelliteRegistered(SatelliteRegistration)         returns (StatusResponse);
  rpc NotifySatelliteGone      (SatelliteRegistration)         returns (StatusResponse);

  // --- Speaker Enrollment ---
  rpc EnrollVoiceprint    (EnrollVoiceprintRequest)            returns (StatusResponse);

  // --- ioBroker Agent ---
  // Single bidirectional stream between the HannahAgent ioBroker adapter and Hannah Core.
  // The adapter pushes state updates (device states, presence, text commands);
  // Hannah pushes device-control commands and on-demand state-subscription requests back.
  // The adapter initiates the connection; if Hannah restarts, the adapter reconnects.
  rpc AgentConnect (stream AgentMessage) returns (stream AgentCommand);
}

// ============================================================
//  Shared
// ============================================================

message Empty {}

message StatusResponse {
  bool   ok      = 1;
  string message = 2;
}

// ============================================================
//  User Registry messages
// ============================================================

message User {
  string uuid            = 1;
  string roomie_id       = 2;
  string display_name    = 3;
  int32  trust_level     = 4;
  bool   active          = 5;
  // linked_accounts: service → account_id  (e.g. "telegram" → "123456789")
  map<string, string> linked_accounts = 6;
  bool   system_messages = 7;  // receives ioBroker/system notifications via Telegram
}

message GetUsersRequest {
  bool include_inactive = 1;
}

message GetUsersResponse {
  repeated User users = 1;
}

// Exactly one of the lookup fields should be set.
message GetUserRequest {
  oneof lookup {
    string                roomie_id      = 1;
    string                uuid           = 2;
    LinkedAccountLookup   linked_account = 3;
  }
}

message LinkedAccountLookup {
  string service    = 1;
  string account_id = 2;
}

message UserResponse {
  bool found = 1;
  User user  = 2;  // only valid when found == true
}

message LinkAccountRequest {
  string roomie_id  = 1;
  string service    = 2;
  string account_id = 3;
}

message UnlinkAccountRequest {
  string service    = 1;
  string account_id = 2;
}

message SetTrustLevelRequest {
  string roomie_id = 1;
  int32  level     = 2;  // clamped to [0, 10]
}

message SetSystemMessagesRequest {
  string roomie_id = 1;
  bool   enabled   = 2;
}

// ============================================================
//  Control messages
// ============================================================

message SubmitTextRequest {
  string text            = 1;
  // Identifies the calling service and its user, so Hannah can look up
  // the corresponding roomie via linked_accounts.
  string source_service  = 2;  // e.g. "telegram"
  string source_user_id  = 3;  // e.g. Telegram chat_id as string
}

message SubmitTextResponse {
  string answer      = 1;  // text to send back to the user
  string intent_name = 2;  // e.g. "WeatherQuery", "TurnOn", "Unknown"
}

message SubmitVoiceRequest {
  bytes  audio           = 1;  // OGG/Opus audio bytes (from Telegram voice message)
  string source_service  = 2;  // e.g. "telegram"
  string source_user_id  = 3;  // e.g. Telegram chat_id as string
}

message SubmitVoiceResponse {
  string transcript  = 1;  // STT result (for display / caption)
  string answer      = 2;  // text answer from Hannah
  string intent_name = 3;  // e.g. "CarQuery" — caller may enrich the text reply
  bytes  audio_ogg   = 4;  // OGG/Opus TTS response (empty if TTS disabled or failed)
}

message AnnounceRequest {
  string text   = 1;
  string device = 2;  // satellite device name, or "all" for broadcast
}

message Satellite {
  string device_id = 1;
  string room      = 2;   // room name as registered
  string address   = 3;   // IP:port of the UDP satellite
}

message GetSatellitesResponse {
  repeated Satellite satellites = 1;
}

// ============================================================
//  Car state messages
// ============================================================

message CarStateResponse {
  bool         available = 1;  // false if no MQTT data received yet
  CarStateProto state    = 2;
}

message GetAllCarStatesResponse {
  repeated CarStateProto states = 1;
}

message CarStateProto {
  // position
  float  latitude      = 1;
  float  longitude     = 2;
  string address       = 3;
  bool   is_moving     = 4;
  int64  position_date = 5;   // Unix timestamp (seconds)

  // status
  int32  odometer         = 6;
  int32  total_range      = 7;
  bool   is_car_locked    = 8;
  string door_lock_status = 9;
  string overall_status   = 10;

  // doors/windows: name → true (closed) / false (open)
  map<string, bool> doors   = 11;
  map<string, bool> windows = 12;

  // Roomie-ID des Fahrzeughalters (leer = kein Owner-Filter)
  string owner_roomie = 13;

  // Metadaten
  string display_name = 14;  // z.B. "Leonies Golf"
  string plate        = 15;  // Nummernschild
  string vin          = 16;  // Fahrzeug-Identifikationsnummer
  string home_address = 17;  // Heimadresse für "steht zu Hause"-Erkennung
}

// ============================================================
//  Event stream messages
// ============================================================

message EventFilter {
  // If empty, subscribe to all event types.
  repeated string event_types = 1;
}

message HannahEvent {
  string event_type = 1;   // "car.parked" | "resident.arrived" | "resident.departed" | "system.notification" | "satellite.firmware"
  string timestamp  = 2;   // ISO 8601 UTC

  oneof payload {
    CarStateProto            car_state            = 10;
    ResidentEventProto       resident_event       = 11;
    SystemNotificationEvent  system_notification  = 12;
    FirmwareEventProto       firmware_event       = 13;
  }
}

message SystemNotificationEvent {
  string text = 1;  // LLM-reformulierter Benachrichtigungstext
}

message FirmwareEventProto {
  string device  = 1;
  string version = 2;
}

message TriggerFirmwareUpdateRequest {
  string device = 1;
}

message ResidentEventProto {
  string roomie_id    = 1;
  string display_name = 2;
  string event        = 3;   // "arrived" | "departed"
}

// ============================================================
//  Satellite Proxy messages (Go gRPC proxy ↔ Hannah Core)
// ============================================================

// Sent by the proxy periodically to keep the RegisterProxy stream alive.
message ProxyHeartbeat {
  string proxy_id = 1;   // human-readable identifier, e.g. "hannah-proxy-living-room"
  // UDP address the proxy is listening on for satellite connections.
  // When set, Hannah publishes this address to the discovery topic so
  // satellites connect to the proxy instead of Hannah's own UDP server.
  string udp_host = 2;   // advertise host, e.g. "192.168.8.5"
  int32  udp_port = 3;   // UDP port, e.g. 7775
}

// Sent by Hannah to the proxy over the RegisterProxy stream.
message ProxyCommand {
  oneof command {
    ProxyAck         ack        = 1;  // initial confirmation when stream is established
    PlayAudioCommand play_audio = 2;  // Hannah wants the proxy to play TTS on a satellite
  }
}

// Sent once by Hannah after RegisterProxy stream is established.
message ProxyAck {
  bool   udp_disabled = 1;  // true = Hannah has disabled its own UDP server
  string message      = 2;  // human-readable status, e.g. "UDP server stopped"
}

// Hannah instructs the proxy to play TTS audio on a specific satellite.
// Used for announcements and other server-initiated audio.
message PlayAudioCommand {
  string device_id   = 1;  // satellite device name (as registered via UDP or proxy)
  bytes  audio_pcm   = 2;  // raw PCM, 16-bit signed mono
  int32  sample_rate = 3;  // e.g. 24000 (Azure) or 16000 (Piper)
}

// Sent by the proxy when a satellite has finished recording an utterance.
message SubmitSatelliteAudioRequest {
  string device_id    = 1;  // satellite device name
  string room         = 2;  // room name (from proxy registration / config)
  bytes  audio_pcm    = 3;  // raw PCM, 16-bit signed mono, 16000 Hz
  int32  sample_rate  = 4;  // sample rate of the audio (typically 16000)
  // Optional: speaker identity provided by an upstream speaker-ID service.
  // Empty = anonymous (Hannah treats as unknown user).
  string speaker_roomie_id = 5;
}

message SubmitSatelliteAudioResponse {
  string transcript  = 1;  // STT result
  string answer      = 2;  // text answer from Hannah
  string intent_name = 3;  // e.g. "TurnOn", "CarQuery", "Unknown"
  bytes  audio_pcm   = 4;  // TTS response as raw PCM, 16-bit signed mono
  int32  sample_rate = 5;  // sample rate of audio_pcm
}

// ============================================================
//  Device Control Menu messages
// ============================================================

message DeviceInfo {
  string id       = 1;  // full device prefix, e.g. "javascript.0.virtualDevice.Licht.EG.Wohnzimmer.DeckeSeite"
  string name     = 2;  // display name, e.g. "DeckeSeite"
  string category = 3;  // e.g. "Licht", "Stecker", "Temperaturen"
  repeated string states = 4;       // available state keys: "on", "level", "color", …
  map<string, string> current = 5;  // current values as strings, e.g. {"on": "true", "level": "75"}
}

message RoomInfo {
  string key              = 1;  // room_id (lowercase), e.g. "wohnzimmer"
  string name             = 2;  // display name, e.g. "Wohnzimmer"
  repeated DeviceInfo devices = 3;
}

message GetDevicesResponse {
  repeated RoomInfo rooms = 1;
}

message ControlDeviceRequest {
  string device_id = 1;  // DeviceInfo.id
  string state     = 2;  // state key: "on", "level", "color"
  string value     = 3;  // string-serialised value: "true", "false", "50", "#FF0000"
}

// ============================================================
//  Speaker Enrollment messages
// ============================================================

message EnrollVoiceprintRequest {
  string roomie_id   = 1;  // whose voice this sample belongs to
  bytes  audio_pcm   = 2;  // raw PCM, 16-bit signed mono
  int32  sample_rate = 3;  // e.g. 16000
}

// ============================================================
//  Satellite Proxy registration messages
// ============================================================

message SatelliteRegistration {
  string device_id = 1;  // satellite device name, e.g. "sat-wohnzimmer"
  string room      = 2;  // room name as reported by satellite, e.g. "Wohnzimmer"
}

// ============================================================
//  ioBroker Agent messages
// ============================================================

// Sent by the HannahAgent ioBroker adapter over the AgentConnect stream.
message AgentMessage {
  oneof payload {
    AgentStateUpdate      state_update      = 1;  // any ioBroker state changed
    AgentResidentUpdate   resident_update   = 2;  // residents adapter presence changed
    AgentTextCommand      text_command      = 3;  // text command state changed
    AgentSatelliteControl satellite_control = 4;  // satellite control command
    AgentDeviceSnapshot   send_snapshot     = 5;  // initial snapshot with all states
    AgentResidentSnapshot send_residents    = 6;  // initial snapshot with all residents
  }
}

// Adapter instructs Hannah to control all satellites in a room.
// room: room name as registered, or "all" for all rooms.
message AgentSatelliteControl {
  string room = 1;
  oneof control {
    bool   dnd               = 2;  // set do-not-disturb
    bool   mute              = 3;  // mute/unmute microphone
    int32  volume            = 4;  // set volume (0–100)
    string announcement      = 5;  // speak plain-text announcement
    string announcement_ssml = 6;  // speak SSML announcement
  }
}

// An ioBroker state change event. ack=true means the device confirmed the value
// (as opposed to ack=false which is the "desired" value). Hannah uses this to
// verify that a SetState command was executed successfully.
message AgentStateUpdate {
  string state_id = 1;  // full ioBroker state ID, e.g. "javascript.0.virtualDevice.Licht.EG.Wohnzimmer.DeckeSeite.on"
  string value    = 2;  // JSON-encoded value: "true", "42", "\"text\""
  bool   ack      = 3;  // true = confirmed by device
  int64  ts       = 4;  // Unix timestamp in milliseconds
}

// A change from the ioBroker residents adapter.
message AgentResidentUpdate {
  string roomie_id      = 1;
  int32  presence_state = 2;  // residents adapter presence value (0=absent, 1=home, …)
  bool   is_guest       = 3;
}

// The text-command state in ioBroker changed — treat as a SubmitText call.
message AgentTextCommand {
  string text = 1;
}

// Sent by Hannah Core over the AgentConnect stream.
message AgentCommand {
  oneof command {
    AgentSetState        set_state        = 1;  // Hannah wants to control an ioBroker device
    AgentWatchMore       watch_more       = 2;  // Hannah needs additional states streamed
    AgentSetResident     set_resident     = 3;  // Hannah wants to set a resident's presence state
    AgentSatelliteUpdate satellite_update = 4;  // a satellite registered or disconnected
    AgentTextAnswer      text_answer      = 5;  // Hannah's answer to a text command
    AgentFirmwareEvent   firmware_event   = 6;  // satellite firmware version update
  }
}

message AgentFirmwareEvent {
  string device           = 1;
  string version          = 2;
  bool   update_available = 3;  // true = newer version pending, false = current version report
}

// Hannah instructs the adapter to set an ioBroker state.
// The adapter calls setForeignState(); the resulting ack=true AgentStateUpdate
// confirms execution back to Hannah.
message AgentSetState {
  string state_id = 1;  // ioBroker state ID to write
  string value    = 2;  // JSON-encoded value
}

// Hannah requests additional state IDs to be included in the AgentStateUpdate stream.
// Used by the trigger engine at runtime when triggers reference arbitrary state IDs
// (e.g. unless.state: "0_userdata.0.feeded") that aren't covered by enum discovery.
message AgentWatchMore {
  repeated string state_ids = 1;
}

// Hannah instructs the adapter to set a resident's presence state in the residents adapter.
// is_guest determines whether the target path is .roomie. or .guest.
message AgentSetResident {
  string resident_id    = 1;  // e.g. "leonie", "hannah"
  int32  presence_state = 2;  // residents adapter presence value (0=absent, 1=home, …)
  bool   is_guest       = 3;  // false → residents.<n>.roomie.<id>, true → residents.<n>.guest.<id>
}

// Hannah notifies the adapter that a satellite registered or disconnected.
// The adapter updates hannah.<instance>.satellites.rooms.<room>.* states accordingly.
message AgentSatelliteUpdate {
  string device_id = 1;  // satellite device ID
  string room      = 2;  // room the satellite is assigned to
  string address   = 3;  // UDP address (empty if not applicable)
  bool   online    = 4;  // true = registered/online, false = gone/offline
}

// Hannah sends the answer to a text command back to the adapter.
// The adapter sets hannah.<instance>.textAnswer accordingly.
message AgentTextAnswer {
  string text   = 1;  // plain-text answer
  string intent = 2;  // detected intent name
}

// A notification from the ioBroker adapter.
// direct=true: skip LLM, play text unchanged (severity ignored).
// direct=false: LLM reformulates text; severity controls tone ("alert"|"notify"|"info").
message AgentNotification {
  string text     = 1;
  bool   direct   = 2;
  string severity = 3;  // "alert" | "notify" | "info" — only used when direct=false
}

message AgentStateValue {
    string value = 1;
    bool ack      = 2;
}

// A device from the ioBroker adapter
message AgentDevice {
    string state_id  = 1;
    string floor     = 2;
    string room      = 3;
    string device    = 4;
    string device_type        = 5;
    repeated string functions = 6;
    AgentStateValue value     = 7;
}

// a list with all known devices from the ioBroker adapter
message AgentDeviceSnapshot {
    repeated AgentDevice devices = 1;
}

// A resident from the ioBroker adapter
message AgentResident {
  string roomie_id   = 1;
  string name        = 2;
  bool   is_guest    = 3;
}

// a list with all known residents
message AgentResidentSnapshot {
  repeated AgentResident residents = 1;
}