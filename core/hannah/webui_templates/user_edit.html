{% extends "base.html" %}
{% block title %}User bearbeiten{% endblock %}
{% block content %}
<div class="mb-3">
  <a href="{{ url_for('users') }}" class="text-decoration-none text-muted small">← User</a>
</div>

<h2 class="h4 mb-4">User bearbeiten</h2>

<div class="card">
  <div class="card-body">
    <form method="post" action="{{ url_for('edit_user', user_id=user.id) }}">
      <div class="row g-3">
        <div class="col-sm-6">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" value="{{ user.username }}" disabled>
          <div class="form-text text-muted">Username kann nicht geändert werden.</div>
        </div>
        <div class="col-sm-6">
          <label class="form-label">Anzeigename</label>
          <input type="text" name="display_name" class="form-control" value="{{ user.display_name }}">
        </div>
        <div class="col-sm-6">
          <label class="form-label">E-Mail</label>
          <input type="email" name="email" class="form-control" value="{{ user.email }}">
        </div>
        <div class="col-sm-6">
          <label class="form-label">Neues Passwort</label>
          <input type="password" name="password" class="form-control" placeholder="Leer lassen = unverändert">
        </div>
        <div class="col-sm-6">
          <label class="form-label">Typ</label>
          <select name="type" class="form-select">
            {% for t in types %}
            <option value="{{ t }}" {% if user.type == t %}selected{% endif %}>{{ t }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-sm-6">
          <label class="form-label">Trust-Level</label>
          <input type="number" name="trust_level" class="form-control" min="0" max="10" value="{{ user.trust_level }}">
        </div>
        <div class="col-sm-6">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="is_active" id="is_active" {% if user.is_active %}checked{% endif %}>
            <label class="form-check-label" for="is_active">Aktiv</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="system_messages" id="system_messages" {% if user.system_messages %}checked{% endif %}>
            <label class="form-check-label" for="system_messages">System-Benachrichtigungen</label>
          </div>
        </div>
      </div>

      <div class="d-flex gap-2 mt-4">
        <button class="btn btn-primary">Speichern</button>
        <a href="{{ url_for('users') }}" class="btn btn-outline-secondary">Abbrechen</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
