<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hannah – {% block title %}Verwaltung{% endblock %}</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 600; letter-spacing: .02em; }
    .nav-link.active { font-weight: 600; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .table th { font-weight: 500; font-size: .875rem; color: #6c757d; border-top: none; }
    .badge-room { background: #e9ecef; color: #495057; font-weight: 400; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-md navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">Hannah</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'rooms' %}active{% endif %}"
             href="{{ url_for('rooms') }}">Räume</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint in ('groups', 'edit_group') %}active{% endif %}"
             href="{{ url_for('groups') }}">Gruppen</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'satellites' %}active{% endif %}"
             href="{{ url_for('satellites') }}">Satelliten</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
<div class="container pb-5">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmiwYCMzMi6jfwMBwNhVFl6Wr2K"
        crossorigin="anonymous"></script>
</body>
</html>
