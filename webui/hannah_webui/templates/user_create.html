{% extends "base.html" %}
{% block title %}User anlegen{% endblock %}
{% block content %}
<div class="mb-3">
  <a href="{{ url_for('users') }}" class="text-decoration-none text-muted small">← User</a>
</div>

<h2 class="h4 mb-4">User anlegen</h2>

<div class="card">
  <div class="card-body">
    <form method="post" action="{{ url_for('create_user') }}">
      <div class="row g-3">
        <div class="col-sm-6">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" required>
        </div>
        <div class="col-sm-6">
          <label class="form-label">Anzeigename</label>
          <input type="text" name="display_name" class="form-control" placeholder="Default: Username">
        </div>
        <div class="col-sm-6">
          <label class="form-label">E-Mail</label>
          <input type="email" name="email" class="form-control" required>
        </div>
        <div class="col-sm-6">
          <label class="form-label">Passwort</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <div class="col-sm-6">
          <label class="form-label">Typ</label>
          <select name="type" class="form-select">
            {% for t in types %}
            <option value="{{ t }}">{{ t }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="d-flex gap-2 mt-4">
        <button class="btn btn-primary">Anlegen</button>
        <a href="{{ url_for('users') }}" class="btn btn-outline-secondary">Abbrechen</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
